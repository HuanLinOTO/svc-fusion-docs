<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="45%" stop-color="#0A1D4A"/>
      <stop offset="100%" stop-color="#122E70"/>
    </linearGradient>

    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4FAFF"/>
      <stop offset="55%" stop-color="#B7DEFF"/>
      <stop offset="100%" stop-color="#7EC7FF"/>
    </linearGradient>

    <linearGradient id="btnGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39C7FF"/>
      <stop offset="100%" stop-color="#3F78FF"/>
    </linearGradient>

    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>

    <radialGradient id="haloBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#55B6FF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#55B6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haloPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B7DFF" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#7B7DFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coreGradient" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#9DE7FF"/>
      <stop offset="100%" stop-color="#4A8FFF"/>
    </radialGradient>

    <filter id="blurXL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bgGradient)"/>
  <circle cx="960" cy="260" r="250" fill="url(#haloBlue)" filter="url(#blurXL)"/>
  <circle cx="260" cy="760" r="220" fill="url(#haloPurple)" filter="url(#blurXL)"/>

  <g opacity="0.10" stroke="#9EC4FF" stroke-width="1">
    <path d="M0 140 H1200"/>
    <path d="M0 280 H1200"/>
    <path d="M0 420 H1200"/>
    <path d="M0 560 H1200"/>
    <path d="M0 700 H1200"/>
    <path d="M180 0 V900"/>
    <path d="M360 0 V900"/>
    <path d="M540 0 V900"/>
    <path d="M720 0 V900"/>
    <path d="M900 0 V900"/>
    <path d="M1080 0 V900"/>
  </g>

  <g fill="#DDF1FF">
    <circle cx="90" cy="85" r="1.5" opacity="0.8"/>
    <circle cx="210" cy="70" r="1.2" opacity="0.9"/>
    <circle cx="330" cy="120" r="1.8" opacity="0.7"/>
    <circle cx="470" cy="90" r="1.3" opacity="0.9"/>
    <circle cx="615" cy="65" r="1.6" opacity="0.8"/>
    <circle cx="750" cy="110" r="1.2" opacity="0.7"/>
    <circle cx="920" cy="80" r="1.7" opacity="0.85"/>
    <circle cx="1110" cy="115" r="1.4" opacity="0.8"/>

    <circle cx="80" cy="240" r="1.2" opacity="0.6"/>
    <circle cx="270" cy="260" r="1.4" opacity="0.8"/>
    <circle cx="520" cy="230" r="1.1" opacity="0.75"/>
    <circle cx="700" cy="240" r="1.6" opacity="0.85"/>
    <circle cx="1080" cy="270" r="1.3" opacity="0.7"/>

    <circle cx="150" cy="500" r="1.5" opacity="0.8"/>
    <circle cx="340" cy="560" r="1.2" opacity="0.85"/>
    <circle cx="560" cy="520" r="1.4" opacity="0.8"/>
    <circle cx="780" cy="530" r="1.1" opacity="0.75"/>
    <circle cx="1020" cy="550" r="1.7" opacity="0.9"/>

    <circle cx="130" cy="760" r="1.3" opacity="0.7"/>
    <circle cx="300" cy="820" r="1.5" opacity="0.8"/>
    <circle cx="560" cy="790" r="1.2" opacity="0.75"/>
    <circle cx="860" cy="810" r="1.4" opacity="0.8"/>
    <circle cx="1060" cy="770" r="1.2" opacity="0.7"/>
  </g>

  <rect x="70" y="70" width="1060" height="760" rx="30" fill="url(#panelGradient)" stroke="#C7E1FF" stroke-opacity="0.25"/>

  <g transform="translate(120 130)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#93D9FF" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#A8E9FF"/>
    <circle cx="14" cy="-12" r="4" fill="#A8E9FF"/>
    <circle cx="-15" cy="13" r="5" fill="#79B8FF"/>
    <path d="M-24 0 C-9 -15 9 -15 24 0" fill="none" stroke="#93D9FF" stroke-width="2" opacity="0.85"/>
  </g>
  <text x="160" y="140" fill="#EAF4FF" font-size="34" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">星海智算</text>

  <text x="120" y="300" fill="url(#titleGradient)" font-size="108" font-weight="800" letter-spacing="2" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">星海智算</text>
  <text x="120" y="365" fill="#D4E7FF" font-size="36" font-weight="500" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">让每一份算力，奔向更远星海</text>

  <text x="120" y="420" fill="#9BBBE9" font-size="23" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">
    面向大模型训练与推理的一站式 AI 算力平台
  </text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="24" fill="#DFF1FF">
    <rect x="120" y="470" width="220" height="62" rx="31" fill="#10306E" fill-opacity="0.68" stroke="#7FB6FF" stroke-opacity="0.4"/>
    <text x="230" y="510" text-anchor="middle">高性能 GPU 集群</text>

    <rect x="360" y="470" width="220" height="62" rx="31" fill="#10306E" fill-opacity="0.68" stroke="#7FB6FF" stroke-opacity="0.4"/>
    <text x="470" y="510" text-anchor="middle">分钟级弹性扩缩</text>

    <rect x="600" y="470" width="220" height="62" rx="31" fill="#10306E" fill-opacity="0.68" stroke="#7FB6FF" stroke-opacity="0.4"/>
    <text x="710" y="510" text-anchor="middle">企业级安全保障</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="120" y="610" width="300" height="84" rx="42" fill="url(#btnGradient)"/>
  </g>
  <text x="270" y="664" text-anchor="middle" fill="#FFFFFF" font-size="34" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">立即体验</text>
  <text x="120" y="730" fill="#9FC0EB" font-size="22" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">官网：xinghai-compute.ai</text>

  <g transform="translate(900 430)">
    <circle r="248" fill="none" stroke="#7FB9FF" stroke-opacity="0.22" stroke-width="2"/>
    <circle r="198" fill="none" stroke="#7FB9FF" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="9 8"/>
    <circle r="148" fill="none" stroke="#93CCFF" stroke-opacity="0.45" stroke-width="2"/>

    <g stroke="#8EC6FF" stroke-opacity="0.65" stroke-width="2">
      <path d="M0 -148 L0 -92"/>
      <path d="M105 -105 L64 -64"/>
      <path d="M148 0 L92 0"/>
      <path d="M105 105 L64 64"/>
      <path d="M0 148 L0 92"/>
      <path d="M-105 105 L-64 64"/>
      <path d="M-148 0 L-92 0"/>
      <path d="M-105 -105 L-64 -64"/>
    </g>

    <g fill="#A8E6FF" filter="url(#softGlow)">
      <circle cx="0" cy="-148" r="8"/>
      <circle cx="105" cy="-105" r="8"/>
      <circle cx="148" cy="0" r="8"/>
      <circle cx="105" cy="105" r="8"/>
      <circle cx="0" cy="148" r="8"/>
      <circle cx="-105" cy="105" r="8"/>
      <circle cx="-148" cy="0" r="8"/>
      <circle cx="-105" cy="-105" r="8"/>
    </g>

    <circle r="86" fill="url(#coreGradient)" opacity="0.9" filter="url(#softGlow)"/>
    <rect x="-70" y="-70" width="140" height="140" rx="22" fill="#0D2A63" stroke="#9AD8FF" stroke-opacity="0.75"/>
    <rect x="-44" y="-44" width="88" height="88" rx="14" fill="#16408F" stroke="#A9E7FF" stroke-opacity="0.8"/>
    <text x="0" y="8" text-anchor="middle" fill="#DFF5FF" font-size="21" font-weight="700" font-family="Arial, sans-serif">AI CORE</text>
  </g>

  <g opacity="0.85">
    <rect x="790" y="700" width="22" height="90" rx="8" fill="#63B8FF"/>
    <rect x="824" y="670" width="22" height="120" rx="8" fill="#7BC6FF"/>
    <rect x="858" y="640" width="22" height="150" rx="8" fill="#95D4FF"/>
    <rect x="892" y="680" width="22" height="110" rx="8" fill="#B4E2FF"/>
  </g>

  <text x="120" y="790" fill="#8FAEDC" font-size="22" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">
    AI算力云平台 · 大模型训练 · 推理加速 · 行业智能解决方案
  </text>
</svg>